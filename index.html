<script>
const profile = document.getElementById("profile");
const audio = document.getElementById("bgm");

let toggled = false;

profile.addEventListener("click", () => {
  toggled = !toggled;

  // swap image → gif
  profile.src = toggled
    ? "assets/images/profile.gif"
    : "assets/images/profile-static.png";

  // play / pause music
  if (toggled) {
    audio.currentTime = 0;
    audio.play();
  } else {
    audio.pause();
  }
});
</script>
