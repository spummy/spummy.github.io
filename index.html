<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pinch me, for I am awake.</title>
<link rel="icon" type="image/png" href="assets/images/profile-static.png">

<style>
:root {
  --bg-color: #000;
  --sidebar-bg: #050505;
  --accent-color: #222;
  --hover-color: #444;
  --text-color: #fff;
  --transition-speed: 0.8s;
}

body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: var(--bg-color);
  color: var(--text-color);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
  transition: filter var(--transition-speed) ease;
}

/* MOOD SYSTEM */
body[data-mood="profile"] { filter: brightness(1.1) contrast(1.1); }
body[data-mood="sad"] { filter: brightness(0.5) contrast(1.4) grayscale(0.5); }
body[data-mood="idle"] { filter: brightness(1) contrast(1); }

/* SIDEBAR (FIXED + STABLE) */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid #111;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px;
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.5;
}

/* SCROLLABLE GALLERY ONLY */
#gallery {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.gallery-item {
  display: block;
  margin-bottom: 14px;
}

#gallery img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 4px;
  opacity: 0.55;
  transition: 0.3s ease;
}

#gallery img:hover {
  opacity: 1;
  transform: scale(1.02);
}

/* MAIN CONTENT (CLEAN SINGLE RULE) */
main {
  margin-left: 240px;
  width: calc(100% - 240px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  box-sizing: border-box;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
}

.profile-trigger {
  width: 180px;
  height: 180px;
  cursor: pointer;
}

.quote { font-style: italic; font-size: 1.2rem; }
.subquote { font-size: 0.8rem; opacity: 0.5; }

/* SECTIONS */
.section {
  width: 100%;
  max-width: 420px;
  margin-bottom: 40px;
  text-align: center;
}

.section h2 {
  font-size: 0.8rem;
  letter-spacing: 4px;
  opacity: 0.4;
}

.link {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: var(--accent-color);
  color: var(--text-color);
  text-decoration: none;
  border-radius: 4px;
}

.link:hover {
  background: var(--hover-color);
}

/* MOOD ICON */
.sad-trigger {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 80px;
  cursor: pointer;
  opacity: 0.7;
}

/* MOBILE */
@media (max-width: 768px) {
  body { flex-direction: column; }

  .sidebar {
    position: relative;
    width: 100%;
    height: 260px;
  }

  main {
    margin-left: 0;
    width: 100%;
  }
}
</style>
</head>

<body data-mood="idle">

<audio id="audio-player"></audio>

<aside class="sidebar">
  <div class="sidebar-header">PHOTO ARCHIVE</div>
  <div id="gallery"></div>
</aside>

<main>

  <div class="header">
    <img id="profile-img" class="profile-trigger" src="assets/images/profile-static.png">

    <p class="quote">"The sun loves you, and I love you too!"</p>
    <p class="subquote">ຕາເວັນຮັກເຈົ້າ ຂ້ອຍກໍຮັກເຈົ້າຄືກັນ</p>
  </div>

  <section class="section">
    <h2>Crust</h2>
    <a class="link" href="https://discord.gg/gwCuT2SeFk">discord</a>
    <a class="link" href="https://www.instagram.com/teejys">instagram</a>
    <a class="link" href="https://www.tiktok.com/@teejys">tiktok</a>
    <a class="link" href="https://learningstages.bandcamp.com">bandcamp</a>
  </section>

  <section class="section">
    <h2>R. House Productions</h2>
    <a class="link" href="https://rhouseproductions.bandcamp.com/">bandcamp</a>
    <a class="link" href="https://instagram.com/rhouseproductions">instagram</a>
    <a class="link" href="https://facebook.com/revivalhousew00t">facebook</a>
  </section>

  <section class="section">
    <h2>Mantle</h2>
    <a class="link" href="bible.html">lyric bible v1</a>
    <a class="link" href="https://teejys.substack.com">blog</a>
    <a class="link" href="mailto:sup@teejys.com">contact</a>
  </section>

  <section class="section">
    <h2>Feed the Abyss</h2>
    <a class="link" href="https://cash.app/$teejyscash">cash app</a>
  </section>

</main>

<img id="sad-img" class="sad-trigger" src="assets/images/sad.png">

<script>
const files = [
"10-24-2023-passport-pic_55224122261_c.jpg",
"2017-crunchy-rol_55224698479_l.jpg",
"2017-got-my-first-hollow-body-emperor-ii---joe-pass_55224619573_l.jpg",
"2017-iconic-phoneception_55224451391_l.jpg",
"2017-my-heart_55224858105_l.jpg",
"2017-trump-protests-portland-oregon_55224619558_l.jpg",
"2025-where-were-you-when-the-sky-fell-black-2_55224633358_l.jpg"
];

const gallery = document.getElementById("gallery");

files.forEach(f => {
  const img = document.createElement("img");
  img.src = "assets/gallery/" + f;
  gallery.appendChild(img);
});

/* AUDIO */
const audio = document.getElementById("audio-player");
const profile = document.getElementById("profile-img");
const sad = document.getElementById("sad-img");

let state = "idle";

function stopAudio() {
  audio.pause();
  audio.src = "";
}

/* PROFILE */
profile.onclick = () => {
  if (state === "profile") {
    state = "idle";
    profile.src = "assets/images/profile-static.png";
    stopAudio();
    return;
  }

  state = "profile";
  profile.src = "assets/images/profile.gif";
  sad.src = "assets/images/sad.png";

  stopAudio();
  audio.src = "assets/audio/here we aint.wav";
  audio.play();
};

/* SAD */
sad.onclick = () => {
  if (state === "sad") {
    state = "idle";
    sad.src = "assets/images/sad.png";
    stopAudio();
    return;
  }

  state = "sad";
  sad.src = "assets/images/sad.gif";
  profile.src = "assets/images/profile-static.png";

  stopAudio();
  audio.src = "assets/audio/dream.wav";
  audio.play();
};
</script>

</body>
</html>
