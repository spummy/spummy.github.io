<script>
const videos = [
  "fHnBDu3BNCk",
  "DJ5xwgO-pCs"
];

const audio = document.getElementById("audio");
const profile = document.getElementById("profile");
const sad = document.getElementById("sad");
const player = document.getElementById("ytplayer");

let layer = "surface";

/* -----------------------
   VIDEO LOADER (depth only)
------------------------*/
function loadVideo() {
  const pick = videos[Math.floor(Math.random() * videos.length)];
  player.src = "https://www.youtube.com/embed/" + pick + "?rel=0";
}

/* -----------------------
   STATE RENDERER (KEY FIX)
------------------------*/
function renderState() {
  document.body.setAttribute("data-layer", layer);

  if (layer === "surface") {
    profile.src = "assets/images/profile-static.png";
    sad.src = "assets/images/sad.png";

    audio.pause();
    audio.src = "assets/audio/here we aint.wav";
    audio.currentTime = 0;
    audio.play();

    player.src = ""; // stop video in surface
  }

  if (layer === "depth") {
    profile.src = "assets/images/profile.gif";
    sad.src = "assets/images/sad.gif";

    audio.pause();
    audio.src = "assets/audio/dream.wav";
    audio.currentTime = 0;
    audio.play();

    loadVideo();
  }
}

/* -----------------------
   CONTROLS
------------------------*/
profile.onclick = () => {
  layer = "surface";
  renderState();
};

sad.onclick = () => {
  layer = "depth";
  renderState();
};

/* INIT */
renderState();
</script>
