<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pinch me, for I am awake.</title>
<link rel="icon" type="image/png" href="assets/images/profile-static.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:'Cinzel', serif;
}

/* Profile */
.profile {
  width:150px;
  height:150px;
  display:block;
  margin:20px auto;
  border-radius:50%;
  cursor:pointer;
}

/* Card list */
.card-list {
  display:flex;
  flex-direction:column;
  gap:15px;
  width:90%;
  max-width:400px;
  margin:20px auto 180px;
}

/* IMPORTANT: display:block */
.card {
  display:block;
  text-decoration:none;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:16px;
  text-align:center;
  color:#fff;
  font-size:1.1em;
  transition:transform .2s, background .2s;
}

.card:hover {
  transform:scale(1.04);
  background:#222;
}

.feed-card {
  font-family:'Orbitron', sans-serif;
  animation:pulse 2s infinite alternate;
}

@keyframes pulse {
  from { box-shadow:0 0 8px #fff; }
  to   { box-shadow:0 0 20px #fff; }
}

/* Bottom character */
.character-container {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:100px;
  height:100px;
  z-index:5;
}

.character-container img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}

#overlay {
  pointer-events:none;
}

/* Quote */
#quote-display {
  position:fixed;
  bottom:130px;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  transition:opacity .3s;
}
</style>
</head>

<body>

<img src="assets/images/profile-static.png" class="profile" id="profile">

<div class="card-list">
  <a href="https://discord.gg/YOURINVITE" target="_blank" class="card">Discord</a>
  <a href="https://your-substack-url" target="_blank" class="card">Diary</a>
  <a href="https://bandcamp.com" target="_blank" class="card">Bandcamp</a>
  <a href="https://youtube.com" target="_blank" class="card">YouTube</a>
  <a href="https://instagram.com" target="_blank" class="card">Instagram</a>
  <a href="https://tiktok.com" target="_blank" class="card">TikTok</a>
  <a href="/feed" class="card feed-card">Feed the Abyss</a>
</div>

<div class="character-container">
  <img src="assets/images/guy2.png" id="guy">
  <img src="assets/images/sad.gif" id="overlay">
</div>

<div id="quote-display">yeet</div>

<script>
const profile = document.getElementById('profile');
profile.onclick = () => {
  profile.src = profile.src.includes('static')
    ? 'assets/images/profile.gif'
    : 'assets/images/profile-static.png';
};

const guy = document.getElementById('guy');
const quote = document.getElementById('quote-display');
const frames = ['assets/images/guy2.png','assets/images/guy3.png'];
let timer;

guy.onclick = () => {
  quote.style.opacity = 1;
  let i = 0;
  clearInterval(timer);
  timer = setInterval(() => {
    i = (i + 1) % frames.length;
    guy.src = frames[i];
  }, 300);

  setTimeout(() => {
    clearInterval(timer);
    guy.src = frames[0];
    quote.style.opacity = 0;
  }, 3000);
};
</script>

</body>
</html>
