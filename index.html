<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pinch me, for I am awake.</title>
<link rel="icon" type="image/png" href="assets/images/profile-static.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background:#000; color:#fff;
  font-family:'Cinzel', serif;
}

.card-list {
  display:flex;
  flex-direction:column;
  gap:15px;
  width:90%;
  max-width:400px;
  margin:50px auto;
}

.card {
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:15px;
  text-align:center;
  font-size:1.1em;
  color:#fff;
  font-family:'Cinzel', serif;
  transition: transform 0.3s, background 0.3s;
}
.card:hover {
  transform:scale(1.05);
  background:#222;
}

.feed-card {
  font-family:'Orbitron', sans-serif;
  font-weight:700;
  background:#222;
  animation:pulse 2s infinite alternate;
}
@keyframes pulse { 0%{box-shadow:0 0 8px #fff;} 100%{box-shadow:0 0 20px #fff;} }

/* Interactive guy fixed at bottom */
.character-container {
  position: fixed;
  bottom: 20px;
  left:50%;
  transform: translateX(-50%);
  cursor:pointer;
  z-index:2;
}
.character-container img {
  width:80px;
}

/* Quote over shoulder */
#quote-display {
  position: fixed;
  bottom:110px; /* above the guy */
  left:50%;
  transform: translateX(-50%);
  color:#fff;
  font-family:'Cinzel', serif;
  font-size:1em;
  opacity:0;
  transition:opacity 0.3s;
}
</style>
</head>
<body>

<!-- Vertical list of cards -->
<div class="card-list">
  <a href="#" class="card">Discord</a>
  <a href="#" class="card">Substack</a>
  <a href="#" class="card">Bandcamp</a>
  <a href="#" class="card">YouTube</a>
  <a href="#" class="card">Instagram</a>
  <a href="#" class="card">TikTok</a>
  <a href="#" class="card feed-card">Feed the Abyss</a>
</div>

<!-- Interactive guy -->
<div class="character-container" id="guy-container">
  <img src="assets/images/guy2.png" id="guy">
  <img src="assets/images/sad.gif" style="position:absolute; top:0; left:0; width:80px; pointer-events:none;">
</div>

<div id="quote-display">yeet</div>

<script>
const guy = document.getElementById('guy');
const quoteDisplay = document.getElementById('quote-display');
const guyImages = ["assets/images/guy2.png","assets/images/guy3.png"];
let flipInterval;

guy.addEventListener('click', () => {
  const text = "yeet";
  quoteDisplay.style.opacity = 1;

  let index=0;
  clearInterval(flipInterval);
  flipInterval = setInterval(()=>{
    index=(index+1)%guyImages.length;
    guy.src = guyImages[index];
  },300);

  setTimeout(()=>{
    clearInterval(flipInterval);
    guy.src=guyImages[0];
    quoteDisplay.style.opacity=0;
  },3000);
});
</script>

</body>
</html>
