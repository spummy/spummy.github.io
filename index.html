<style>
  body {
    margin: 0;
    padding: 40px 20px;
    margin-left: 240px;
    font-family: "Courier New", monospace;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: filter 0.9s ease, background 0.9s ease;
  }

  body[data-layer="surface"] {
    filter: brightness(1.05);
    background: #000;
  }

  body[data-layer="profile"] {
    filter: brightness(0.9) contrast(1.05);
    background: #020202;
  }

  body[data-layer="depth"] {
    filter: brightness(0.65) contrast(1.25);
    background: #050505;
  }

  /* SIDE FLICKR GALLERY */
  .side-gallery {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100vh;
    overflow-y: auto;
    background: rgba(0,0,0,0.92);
    border-right: 1px solid #222;
    padding: 10px;
  }

  .side-gallery img {
    width: 100%;
    margin-bottom: 10px;
    border-radius: 6px;
    opacity: 0.9;
    display: block;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  img.profile {
    width: 180px;
    height: 180px;
    cursor: pointer;
  }

  p.quote {
    font-style: italic;
    font-size: 1.3em;
    margin: 10px 0 0;
  }

  p.subquote {
    font-size: 0.85em;
    opacity: 0.7;
    margin-top: 5px;
  }

  .section {
    margin-top: 40px;
    width: min(420px, 90%);
    text-align: center;
  }

  h2 {
    font-size: 0.9rem;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-bottom: 10px;
  }

  a.link {
    display: block;
    margin: 8px 0;
    padding: 12px;
    background: #222;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
  }

  a.link:hover {
    background: #444;
  }

  .sad {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 120px;
    cursor: pointer;
    opacity: 0.8;
    transition: transform 0.3s ease;
  }

  .sad:hover {
    transform: scale(1.1);
  }
</style>
</head>

<!-- ENGINE -->
<script>
const audio = document.getElementById("audio");
const profile = document.getElementById("profile");
const sad = document.getElementById("sad");
const gallery = document.getElementById("gallery");

let active = null;

/* FLICKR AUTO LOAD */
const feedURL =
  "https://www.flickr.com/services/feeds/photoset.gne?set=72177720333250616&format=json&nojsoncallback=1";

fetch(feedURL)
  .then(res => res.json())
  .then(data => {
    data.items.forEach(item => {
      const img = document.createElement("img");
      img.src = item.media.m.replace("_m.jpg", "_b.jpg");
      gallery.appendChild(img);
    });
  });

/* PROFILE */
profile.onclick = () => {
  if (active === "profile") {
    active = null;
    profile.src = "assets/images/profile-static.png";
    audio.pause();
    audio.src = "";
    document.body.setAttribute("data-layer", "surface");
    return;
  }

  active = "profile";
  profile.src = "assets/images/profile.gif";
  sad.src = "assets/images/sad.png";

  audio.pause();
  audio.src = "assets/audio/here we aint.wav";
  audio.play();

  document.body.setAttribute("data-layer", "profile");
};

/* SAD */
sad.onclick = () => {
  if (active === "sad") {
    active = null;
    profile.src = "assets/images/profile-static.png";
    sad.src = "assets/images/sad.png";

    audio.pause();
    audio.src = "";
    document.body.setAttribute("data-layer", "surface");
    return;
  }

  active = "sad";
  profile.src = "assets/images/profile-static.png";
  sad.src = "assets/images/sad.gif";

  audio.pause();
  audio.src = "assets/audio/dream.wav";
  audio.play();

  document.body.setAttribute("data-layer", "depth");
};

document.body.setAttribute("data-layer", "surface");
</script>

</body>
