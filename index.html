<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pinch me, for I am awake.</title>
<link rel="icon" type="image/png" href="assets/images/profile-static.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background:#000; color:#fff;
  font-family:'Cinzel', serif;
}

/* Profile at top */
img.profile {
  width:150px;
  height:150px;
  display:block;
  margin:20px auto;
  border-radius:50%;
  cursor:pointer;
  transition: transform 0.5s;
}
img.profile:hover { transform: scale(1.05); }

/* Vertical card list */
.card-list {
  display:flex;
  flex-direction:column;
  gap:15px;
  width:90%;
  max-width:400px;
  margin:20px auto 160px auto; /* leave space for guy at bottom */
}

.card {
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:15px;
  text-align:center;
  font-size:1.1em;
  color:#fff;
  font-family:'Cinzel', serif;
  transition: transform 0.3s, background 0.3s;
}
.card:hover {
  transform:scale(1.05);
  background:#222;
}

.feed-card {
  font-family:'Orbitron', sans-serif;
  font-weight:700;
  background:#222;
  animation:pulse 2s infinite alternate;
}
@keyframes pulse { 0%{box-shadow:0 0 8px #fff;} 100%{box-shadow:0 0 20px #fff;} }

/* Interactive guy at bottom */
.character-container {
  position: fixed;
  bottom: 20px;       /* distance from bottom */
  left: 50%;
  transform: translateX(-50%);
  width: 100px;       /* set explicit width */
  height: 100px;      /* set explicit height */
  cursor: pointer;
  z-index: 2;
}

/* stack guy and overlay perfectly */
.character-container img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}
#guy { pointer-events:auto; }        /* base guy clickable */
#overlay { pointer-events:none; }    /* overlay just visual */

/* Quote above guy */
#quote-display {
  position: fixed;
  bottom: 130px; /* slightly above guy */
  left:50%;
  transform: translateX(-50%);
  color:#fff;
  font-family:'Cinzel', serif;
  font-size:1em;
  opacity:0;
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<!-- Profile -->
<img src="assets/images/profile-static.png" alt="Teejys" class="profile" id="profile">

<!-- Vertical cards -->
<div class="card-list">
  <a href="#" class="card">Discord</a>
  <a href="#" class="card">Substack</a>
  <a href="#" class="card">Bandcamp</a>
  <a href="#" class="card">YouTube</a>
  <a href="#" class="card">Instagram</a>
  <a href="#" class="card">TikTok</a>
  <a href="#" class="card feed-card">Feed the Abyss</a>
</div>

<!-- Interactive guy with overlay GIF -->
<div class="character-container" id="guy-container">
  <img src="assets/images/guy2.png" id="guy">
  <img src="assets/images/sad.gif" id="overlay">
</div>

<!-- Quote -->
<div id="quote-display">yeet</div>

<script>
// Profile click toggle
const profile = document.getElementById('profile');
profile.addEventListener('click', ()=>{
  if(profile.src.includes('static')){
    profile.src='assets/images/profile.gif';
  } else {
    profile.src='assets/images/profile-static.png';
  }
});

// Interactive guy click
const guy = document.getElementById('guy');
const overlay = document.getElementById('overlay');
const quote = document.getElementById('quote-display');
const images = ["assets/images/guy2.png","assets/images/guy3.png"];
let interval;

guy.addEventListener('click', ()=>{
  quote.style.opacity = 1;
  let i = 0;
  clearInterval(interval);
  interval = setInterval(()=>{
    i = (i+1) % images.length;
    guy.src = images[i];
  }, 300);

  setTimeout(()=>{
    clearInterval(interval);
    guy.src = images[0];
    quote.style.opacity = 0;
  }, 3000);
});
</script>

</body>
</html>
