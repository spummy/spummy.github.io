<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pinch me, for I am awake.</title>
    <link rel="icon" type="image/png" href="assets/images/profile-static.png">
    <style>
        :root {
            --bg-color: #000;
            --sidebar-bg: #050505;
            --accent-color: #222;
            --hover-color: #444;
            --text-color: #fff;
            --transition-speed: 0.8s;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Courier New", monospace;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            transition: filter var(--transition-speed) ease;
        }

        /* Mood States */
        body[data-mood="profile"] { filter: brightness(1.1) contrast(1.1); }
        body[data-mood="sad"] { filter: brightness(0.5) contrast(1.4) grayscale(0.5); }
        body[data-mood="idle"] { filter: brightness(1) contrast(1); }

        /* Sidebar Gallery */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid #111;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 3px;
            border-bottom: 1px solid #111;
            opacity: 0.6;
        }

        #gallery {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .gallery-item {
            margin-bottom: 25px;
            text-decoration: none;
            display: block;
        }

        .gallery-item img {
            width: 100%;
            border-radius: 4px;
            opacity: 0.6;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .gallery-item:hover img {
            opacity: 1;
            transform: translateY(-2px);
        }

        .gallery-item span {
            display: block;
            font-size: 0.65rem;
            color: #666;
            margin-top: 5px;
            word-break: break-all;
            text-align: center;
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px; /* Offset for fixed sidebar */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }

        .profile-trigger {
            width: 180px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .profile-trigger:active { transform: scale(0.95); }

        .quote-box { margin-top: 20px; }
        .quote { font-style: italic; font-size: 1.2rem; margin: 0; }
        .subquote { font-size: 0.8rem; opacity: 0.5; margin-top: 8px; }

        /* Sections & Links */
        .section {
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
            text-align: center;
        }

        .section h2 {
            font-size: 0.8rem;
            letter-spacing: 4px;
            opacity: 0.4;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .link {
            display: block;
            padding: 14px;
            margin: 10px 0;
            background: var(--accent-color);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background 0.2s ease, letter-spacing 0.2s ease;
        }

        .link:hover {
            background: var(--hover-color);
            letter-spacing: 1px;
        }

        /* Floating Mood Icon */
        .sad-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 100;
        }

        .sad-trigger:hover { opacity: 1; }

        /* Mobile Adaptability */
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: 300px;
                border-right: none;
                border-bottom: 1px solid #111;
            }
            main { margin-left: 0; padding: 40px 15px; }
            body { flex-direction: column; }
        }
    </style>
</head>
<body data-mood="idle">

    <audio id="audio-player"></audio>

    <aside class="sidebar">
        <div class="sidebar-header">PHOTO ARCHIVE</div>
        <div id="gallery"></div>
    </aside>

    <main>
        <div class="header">
            <img id="profile-img" class="profile-trigger" src="assets/images/profile-static.png" alt="Profile">
            <div class="quote-box">
                <p class="quote">"The sun loves you, and I love you too!"</p>
                <p class="subquote">ຕາເວັນຮັກເຈົ້າ ຂ້ອຍກໍຮັກເຈົ້າຄືກັນ</p>
            </div>
        </div>

        <section class="section">
            <h2>Crust</h2>
            <a class="link" href="https://discord.gg/gwCuT2SeFk" target="_blank">discord</a>
            <a class="link" href="https://www.instagram.com/teejys" target="_blank">instagram</a>
            <a class="link" href="https://www.tiktok.com/@teejys" target="_blank">tiktok</a>
            <a class="link" href="https://learningstages.bandcamp.com" target="_blank">bandcamp</a>
        </section>

        <section class="section">
            <h2>R. House Productions</h2>
            <a class="link" href="https://rhouseproductions.bandcamp.com/" target="_blank">bandcamp</a>
            <a class="link" href="https://instagram.com/rhouseproductions" target="_blank">instagram</a>
            <a class="link" href="https://facebook.com/revivalhousew00t" target="_blank">facebook</a>

        </section>

        <section class="section">
            <h2>Mantle</h2>
            <a class="link" href="bible.html">lyric bible v1</a>
            <a class="link" href="https://teejys.substack.com" target="_blank">blog</a>
            <a class="link" href="mailto:sup@teejys.com">contact</a>
        </section>

        <section class="section">
            <h2>Feed the Abyss</h2>
            <a class="link" href="https://cash.app/$teejyscash" target="_blank">cash app</a>
        </section>
    </main>

    <img id="sad-img" class="sad-trigger" src="assets/images/sad.png" alt="Mood">

    <script>
const files = [
"10-24-2023-passport-pic_55224122261_c.jpg",
"2017-crunchy-rol_55224698479_l.jpg",
"2017-got-my-first-hollow-body-emperor-ii---joe-pass_55224619573_l.jpg",
"2017-iconic-phoneception_55224451391_l.jpg",
"2017-my-heart_55224858105_l.jpg",
"2017-trump-protests-portland-oregon_55224619558_l.jpg",
"2025-where-were-you-when-the-sky-fell-black-2_55224633358_l.jpg"
];

const gallery = document.getElementById("gallery");

files.forEach(f => {
  const a = document.createElement("a");
  a.href = "gallery.html";

  const img = document.createElement("img");
  img.src = "assets/gallery/" + f;

  a.appendChild(img);
  gallery.appendChild(a);
});

/* AUDIO SYSTEM */
const audio = document.getElementById("audio");
const profile = document.getElementById("profile");
const sad = document.getElementById("sad");

let state = "idle";

function stop() {
  audio.pause();
  audio.src = "";
}

/* PROFILE */
profile.onclick = () => {
  if (state === "profile") {
    state = "idle";
    profile.src = "assets/images/profile-static.png";
    stop();
    return;
  }

  state = "profile";
  profile.src = "assets/images/profile.gif";
  sad.src = "assets/images/sad.png";

  stop();
  audio.src = "assets/audio/here we aint.wav";
  audio.play();
};

/* SAD */
sad.onclick = () => {
  if (state === "sad") {
    state = "idle";
    sad.src = "assets/images/sad.png";
    stop();
    return;
  }

  state = "sad";
  sad.src = "assets/images/sad.gif";
  profile.src = "assets/images/profile-static.png";

  stop();
  audio.src = "assets/audio/dream.wav";
  audio.play();
};
</script>

</body>
</html>
