:root {
  --bg-color: #000;
  --sidebar-bg: #050505;
  --accent-color: #222;
  --hover-color: #444;
  --text-color: #fff;
  --transition-speed: 0.8s;
}

body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: var(--bg-color);
  color: var(--text-color);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
  transition: filter var(--transition-speed) ease;
}

/* MOOD SYSTEM */
body[data-mood="profile"] { filter: brightness(1.1) contrast(1.1); }
body[data-mood="sad"] { filter: brightness(0.5) contrast(1.4) grayscale(0.5); }
body[data-mood="idle"] { filter: brightness(1) contrast(1); }

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid #111;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* FIXED HEADER BEHAVIOR */
.sidebar-header {
  padding: 12px;
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.5;

  position: sticky;
  top: 0;
  background: #050505;
  z-index: 2;
}

/* GALLERY */
#gallery {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

#gallery img {
  width: 100%;
  height: 110px; /* FIX: less visual weight */
  object-fit: cover;
  border-radius: 4px;
  opacity: 0.55;
  transition: 0.3s ease;
  display: block;
  margin-bottom: 12px;
}

#gallery img:hover {
  opacity: 1;
  transform: scale(1.02);
}

/* MAIN CONTENT */
main {
  margin-left: 240px;
  width: calc(100% - 240px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 24px; /* FIX: breathing room restored */
  box-sizing: border-box;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
}

.profile-trigger {
  width: 180px;
  height: 180px;
  cursor: pointer;
}

.quote { font-style: italic; font-size: 1.2rem; }
.subquote { font-size: 0.8rem; opacity: 0.5; }

/* SECTIONS */
.section {
  width: 100%;
  max-width: 420px;
  margin-bottom: 40px;
  text-align: center;
}

.section h2 {
  font-size: 0.8rem;
  letter-spacing: 4px;
  opacity: 0.4;
}

.link {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: var(--accent-color);
  color: var(--text-color);
  text-decoration: none;
  border-radius: 4px;
}

.link:hover {
  background: var(--hover-color);
}

/* MOOD ICON */
.sad-trigger {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 80px;
  cursor: pointer;
  opacity: 0.7;
}

/* MOBILE */
@media (max-width: 768px) {
  body { flex-direction: column; }

  .sidebar {
    position: relative;
    width: 100%;
    height: 260px;
  }

  main {
    margin-left: 0;
    width: 100%;
    padding: 40px 15px;
  }
}
</style>
