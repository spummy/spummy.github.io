<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pinch me, for I am awake.</title>
  <link rel="icon" type="image/png" href="assets/images/profile-static.png">

  <!-- Google Font for Feed the Abyss -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      scroll-behavior: smooth;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px;
    }

    /* Profile / Audio Trigger */
    img.profile {
      width: 180px;
      height: 180px;
      max-width: 40vw;
      max-height: 40vw;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.5s ease;
      margin-bottom: 20px;
    }
    img.profile:hover {
      transform: scale(1.05);
    }

    /* Quotes */
    p.quote {
      font-style: italic;
      font-size: 1.5em;
      margin-bottom: 5px;
    }
    p.subquote {
      font-size: 0.9em;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    /* Vertical Cards */
    .card-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }

    .card {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      background-color: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 15px 20px;
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
      text-decoration: none;
      color: #fff;
      font-size: 1.1em;
      text-align: center;
    }
    .card:hover {
      transform: scale(1.05);
      background-color: #222;
      box-shadow: 0 0 15px #555;
    }

    /* Feed the Abyss Special */
    .feed-card {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      font-weight: 700;
      background-color: #222;
      animation: pulse 2s infinite alternate;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 8px #fff; }
      100% { box-shadow: 0 0 20px #fff; }
    }

    /* Responsive */
    @media(max-width: 420px){
      .card { font-size: 0.95em; padding: 12px 15px; }
      img.profile { width: 35vw; height: 35vw; }
      p.quote { font-size: 1.2em; }
      p.subquote { font-size: 0.8em; }
    }

  </style>
</head>
<body>

  <!-- Profile / Audio Trigger -->
  <img src="assets/images/profile-static.png" alt="Teejys" class="profile" id="profile">

  <!-- Quotes -->
  <p class="quote">"The sun loves you, and I love you too!"</p>
  <p class="subquote">ຕາເວັນຮັກເຈົ້າ ຂ້ອຍກໍຮັກເຈົ້າຄືກັນ</p>

  <!-- Vertical Cards -->
  <div class="card-container">
    <a href="https://discord.gg/gwCuT2SeFk" target="_blank" class="card">Discord</a>
    <a href="https://teejys.substack.com" target="_blank" class="card">Diary / Substack → Subscribe & Read</a>
    <a href="https://learningstages.bandcamp.com" target="_blank" class="card">Bandcamp</a>
    <a href="https://www.youtube.com/@teejys" target="_blank" class="card">YouTube</a>
    <a href="https://www.instagram.com/teejys" target="_blank" class="card">Instagram</a>
    <a href="https://www.tiktok.com/@teejys" target="_blank" class="card">TikTok</a>
    <a href="https://cash.app/$teejyscash" target="_blank" class="card feed-card">Feed the Abyss — $teejyscash</a>
  </div>

  <!-- Background Audio -->
  <audio id="background-audio" src="assets/audio/jan-4-drums-3.wav" loop></audio>

  <script>
    const profile = document.getElementById('profile');
    const audio = document.getElementById('background-audio');
    let playing = false;

    profile.addEventListener('click', () => {
      if(!playing){
        profile.src = 'assets/images/profile.gif';
        audio.play().catch(err => console.log('Audio play prevented:', err));
        playing = true;
      } else {
        profile.src = 'assets/images/profile-static.png';
        audio.pause();
        audio.currentTime = 0;
        playing = false;
      }
    });
  </script>

</body>
</html>
